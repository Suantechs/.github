name: Reusable build and push image

# Reusable workflow (workflow_call) que construye una imagen Docker y la publica
# en GHCR con tags `latest` y `<sha>` (el `<sha>` permite rollback en el deploy).
#
# El build de la imagen ES el gate de CI: si el Dockerfile (que normalmente corre
# `npm run build` / `astro build` / `nest build`) falla, el workflow falla.
#
# Se llama desde cada repo con ~10 líneas + `secrets: inherit`. Ej:
#
#   jobs:
#     build:
#       uses: Suantechs/.github/.github/workflows/build-image.yml@master
#       with:
#         image_name: enki
#       secrets: inherit

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Nombre de la imagen sin registry ni tag. Se publica en ghcr.io/suantechs/<image_name>.'
        required: true
        type: string
      context:
        description: 'Contexto de build de Docker.'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Ruta al Dockerfile.'
        required: false
        type: string
        default: './Dockerfile'
      build_args:
        description: 'build-args (formato multilínea KEY=VALUE). Útil para inyectar GIT_SHA, etc.'
        required: false
        type: string
        default: ''
    secrets:
      NODE_AUTH_TOKEN:
        description: 'PAT con read:packages para instalar paquetes privados @suantechs/* en el Dockerfile (arquetipo NestJS). Opcional.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/suantechs/${{ inputs.image_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: ${{ inputs.build_args }}
          # node_auth_token se pasa como build secret (vacío si el repo no lo define).
          secrets: |
            node_auth_token=${{ secrets.NODE_AUTH_TOKEN }}
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
